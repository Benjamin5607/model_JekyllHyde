<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jekyll & Hyde</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171923;
      --border: #2d3142;
      --text: #e6e8ef;
      --muted: #9aa0b4;
      --jekyll: #4da3ff;
      --hyde: #ff6b6b;
      --user: #8bda7f;
      --accent: #c084fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-columns: 280px 1fr;
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    aside h1 { font-size: 1.1rem; margin: 0; }
    aside p { color: var(--muted); font-size: 0.85rem; margin: 0; }
    label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
    input, textarea, select, button {
      width: 100%;
      background: #0f1117;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      font-weight: 600;
    }
    button.secondary { background: #22263a; border: 1px solid var(--border); }
    main { display: grid; grid-template-rows: 1fr auto; height: 100vh; }
    #messages {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 820px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .msg.user { align-self: flex-end; background: #142016; border-color: #2f5d3a; }
    .msg.assistant { align-self: flex-start; background: #151826; }
    .msg .tag { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; margin-bottom: 6px; }
    .tag.jekyll { color: var(--jekyll); }
    .tag.hyde { color: var(--hyde); }
    .tag.user { color: var(--user); }
    .composer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: var(--panel);
    }
    .composer input { min-height: 48px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 0.72rem;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
  </style>
</head>
<body>
  <aside>
    <h1>Jekyll & Hyde</h1>
    <p>APAC multilingual guideline duel · MCP-ready</p>

    <div>
      <label>LLM URL (Ollama)</label>
      <input id="llmUrl" value="http://localhost:11434" />
    </div>
    <div>
      <label>Model</label>
      <input id="model" value="llama3.2" />
    </div>
    <div>
      <label>Guidelines (text)</label>
      <textarea id="guidelines"></textarea>
    </div>
    <button class="secondary" id="saveGuidelines">Save guidelines</button>
    <button class="secondary" id="runEvolution">Run evolution (/run)</button>

    <div class="chips" id="langChips"></div>
  </aside>

  <main>
    <div id="messages"></div>
    <div class="composer">
      <input id="input" placeholder="Message in any APAC language…  /help" />
      <button id="send">Send</button>
    </div>
  </main>

  <script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const llmUrl = document.getElementById('llmUrl');
    const model = document.getElementById('model');
    const guidelines = document.getElementById('guidelines');
    const langChips = document.getElementById('langChips');

    function addMessage(role, content, tag) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.innerHTML = `<div class="tag ${tag}">${tag.toUpperCase()}</div>${escapeHtml(content)}`;
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function loadState() {
      const [g, h] = await Promise.all([
        fetch('/api/guidelines').then(r => r.json()),
        fetch('/api/health').then(r => r.json()),
      ]);
      guidelines.value = g.text || '';
      (h.apac_languages || []).slice(0, 12).forEach(code => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = code;
        langChips.appendChild(chip);
      });
      addMessage('assistant', 'Ready. All APAC languages supported. Use /help, /run, /hyde, /jekyll.', 'jekyll');
    }

    async function sendMessage(text) {
      if (!text.trim()) return;
      addMessage('user', text, 'user');
      input.value = '';
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, llm_url: llmUrl.value, model: model.value }),
      });
      const data = await res.json();
      const tag = data.meta?.mode === 'command' && text.startsWith('/hyde') ? 'hyde' : 'jekyll';
      addMessage('assistant', data.content, tag);
    }

    document.getElementById('send').onclick = () => sendMessage(input.value);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(input.value); });

    document.getElementById('saveGuidelines').onclick = async () => {
      await fetch('/api/guidelines', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: guidelines.value, title: 'Chat Guidelines' }),
      });
      addMessage('assistant', 'Guidelines saved.', 'jekyll');
    };

    document.getElementById('runEvolution').onclick = () => sendMessage('/run');

    loadState();
  </script>
</body>
</html>
